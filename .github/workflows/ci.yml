name: CI

on:
  push:
    paths:
      - "backup.py"
      - "restore.py"
      - "homey_flow_svg.py"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backup.py"
      - "restore.py"
      - "homey_flow_svg.py"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint — ruff check
        run: ruff check .

      - name: Test — pytest
        shell: bash
        run: |
          set -o pipefail
          pytest --tb=short 2>&1 | tee /tmp/pytest-out.txt

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo ""
          echo "══════════════════════════════════════"
          echo "  CI RESULTS  (Python ${{ matrix.python-version }})"
          echo "══════════════════════════════════════"
          tail -4 /tmp/pytest-out.txt 2>/dev/null || echo "  (no pytest output captured)"
          echo "══════════════════════════════════════"
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            echo "## CI Results — Python ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -4 /tmp/pytest-out.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
